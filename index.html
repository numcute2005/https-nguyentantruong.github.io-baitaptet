<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Menu dùng iframe</title>
<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    padding:20px;
} 
table{
    width:1200px;
    margin:auto;
    border-collapse:collapse;
    background:white;
    table-layout:fixed;
}
col{
    width:25%;
}
th, td{
    border:2px solid #333;
    padding:10px;
    vertical-align:top;
}
.header{
    padding:0;
}

.header img{
    width:100%;
    height:160px;       
    object-fit:cover;
    object-position:top;   
    display:block;
}
.menu{
    height:420px;
    background:#eee;
}
.menu a{
    display:block;
    margin:8px 0;
    text-decoration:none;
    color:blue;
}
.content{
    height:420px;
    text-align:center;
}
.content iframe{
    width:100%;
    height:300px;
    border:none;
    margin-top:10px;
}
.footer{
    height:160px;
    background:#ddd;
    line-height:1.6;
}
</style>
</head>
<body>
<table>
<colgroup>
    <col>
    <col>
    <col>
    <col>
</colgroup>
<tr>
    <th colspan="4" class="header">
        <img src="banner1.png">
    </th>
</tr>
<tr>
    <td rowspan="2" class="menu">
        <b>Menu</b>
        <a href="page1.html" target="content">Trang 1</a>
        <a href="page2.html" target="content">Trang 2</a>
        <a href="page3.html" target="content">Trang 3</a>
        <a href="page4.html" target="content">Trang 4</a>
        <a href="page5.html" target="content">Trang 5</a>
    </td>
    <td colspan="3" rowspan="2" class="content">
        <h3>Nội dung hiển thị</h3>
        <iframe name="content"></iframe>
    </td>
</tr>
<tr></tr>
<tr>
    <td colspan="4" class="footer">
        <b>Tiểu sử bản thân</b><br>
        Họ tên: Nguyễn Tấn Trường<br>
        Ngành: Công Nghệ Thông Tin<br>
        MSSV: 110124204<br>
        Mã lớp: DA24TTC<br>
        Email:truongtvltv7@gmail.com
    </td>
</tr>
</table>
</body>
</html>
